version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AGBOX_API_URL=${AGBOX_API_URL}
      - AGBOX_API_KEY=${AGBOX_API_KEY}
      - DEBUG=${DEBUG:-False}
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  tests:
    build: .
    environment:
      - AGBOX_API_URL=${AGBOX_API_URL}
      - AGBOX_API_KEY=${AGBOX_API_KEY}
    command: pytest tests/ -v
    profiles:
      - test